<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game - Nokia Style 🍎</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="score" id="score">SKOR: 0</div>
        <div class="game-over" id="gameOver">GAME OVER! 🍎 Tekan MULAI untuk main lagi</div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="controls">
            <p>📱 WASD / Panah untuk gerak | SPACE untuk pause | Makan APEL MERAH! 🍎</p>
        </div>
        <button id="startBtn" onclick="startGame()">MULAI GAME</button>
        <button id="pauseBtn" onclick="pauseGame()">PAUSE</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
